site_name: Herald
site_description: A general-purpose Go framework for composing LLM workflows and building LLM agents.

repo_url: https://github.com/dropdevrahul/herald
repo_name: dropdevrahul/herald

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Agents: agents.md
  - Workflows: workflows.md
  - Providers: providers.md
